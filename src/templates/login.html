{% extends "base.html" %}
{% block breadcrumbs %}
<div class="flex">
    <nav class="flex items-center gap-2 text-sm text-slate-400">
        {{ icon_home() }} <span class="text-slate-300 font-medium">Sign in</span>
    </nav>
</div>
{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-slate-800 border border-slate-700 rounded-xl p-8 shadow-lg">
        <h2 class="text-xl font-semibold text-white mb-6">Sign in</h2>
        {% if login_error == 'invalid' %}
        <p class="text-red-400 text-sm mb-4">Invalid email or password.</p>
        {% elif login_error == 'missing' %}
        <p class="text-red-400 text-sm mb-4">Please enter email and password.</p>
        {% endif %}
        <form method="post" action="/login" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Email</label>
                <input type="email" name="email" id="email" required autocomplete="email"
                    class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-100
                    placeholder-slate-500 focus:ring-2 focus:ring-purple-500 focus:border-transparent" />
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                <input type="password" name="password" id="password" required autocomplete="current-password"
                    class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-100
                    placeholder-slate-500 focus:ring-2 focus:ring-purple-500 focus:border-transparent" />
            </div>
            <button type="submit"
                class="w-full py-2.5 px-4 rounded-lg bg-gradient-to-r from-purple-600 to-purple-500
                text-white font-medium hover:from-purple-500 hover:to-purple-400 transition">
                Sign in
            </button>
        </form>
    </div>
</div>
{% endblock %}
