{% from "snippets/icons.html" import icon_close %}

{% macro modal_add_podcast() %}
<div id="addPodcastModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
    <div class="bg-slate-800 rounded-lg border border-slate-700 w-full max-w-md mx-4 shadow-xl">
        <div class="p-6 border-b border-slate-700">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-semibold text-white">Add New Podcast</h3>
                <button onclick="closeAddPodcastModal()" class="text-slate-400 hover:text-white transition">
                    {{ icon_close() }}
                </button>
            </div>
        </div>
        <form class="p-6 space-y-4" onsubmit="handleAddEpisode(event)">
            <div>
                <label for="episodeTitle" class="block text-sm font-medium text-slate-300 mb-2">Podcast Title</label>
                <input type="text" id="episodeTitle" name="title" required
                    class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="Enter podcast title">
            </div>
            <div>
                <label for="podcastDescription" class="block text-sm font-medium text-slate-300 mb-2">Description
                    (optional)</label>
                <textarea id="podcastDescription" name="podcast-description" rows="3"
                    class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="Enter podcast description"></textarea>
            </div>
            <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-700">
                <button type="button" onclick="closeAddPodcastModal()"
                    class="px-4 py-2 text-slate-300 hover:text-white transition">
                    Cancel
                </button>
                <button type="submit"
                    class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition font-medium">
                    Add Podcast
                </button>
            </div>
        </form>
    </div>
</div>
<script type="application/javascript">
    function openAddPodcastModal() {
        const modal = document.getElementById('addPodcastModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.style.overflow = 'hidden';
    }

    function closeAddPodcastModal() {
        const modal = document.getElementById('addPodcastModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = '';

        // Reset form
        const form = modal.querySelector('form');
        if (form) {
            form.reset();
        }
    }
    // Close modal on Escape key
    document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
            closeAddPodcastModal();
        }
    });
    // Close modal on background click
    document.getElementById('addPodcastModal').addEventListener('click', function (event) {
        if (event.target === this) {
            closeAddPodcastModal();
        }
    });
</script>
{% endmacro %}


<!-- Add Episode Modal -->
{% macro modal_add_episode() %}
<div id="addEpisodeModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center">
    <div class="bg-slate-800 rounded-lg border border-slate-700 w-full max-w-lg mx-4 shadow-xl">
        <div class="p-6 border-b border-slate-700">
            <div class="flex items-center justify-between">
                <h3 class="text-lg font-semibold text-white">Add New Episode</h3>
                <button onclick="closeAddEpisodeModal()" class="text-slate-400 hover:text-white transition">
                    {{ icon_close() }}
                </button>
            </div>
        </div>
        <form class="p-6 space-y-4" onsubmit="handleAddEpisode(event)">
            <div>
                <label for="episodePodcast" class="block text-sm font-medium text-slate-300 mb-2">Podcast</label>
                <span id="episodePodcastTitle" class="w-full block px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-purple-500"></span>
            </div>
            <div>
                <label for="sourceURL" class="block text-sm font-medium text-slate-300 mb-2">Source URL</label>
                <input type="text" id="sourceURL" name="title" required
                    class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-purple-500"
                    placeholder="Enter source URL (ex: YouTube's link)">
            </div>
            <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-700">
                <button type="button" onclick="closeAddEpisodeModal()"
                    class="px-4 py-2 text-slate-300 hover:text-white transition">
                    Cancel
                </button>
                <button type="submit"
                    class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-lg transition font-medium">
                    Add Episode
                </button>
            </div>
        </form>
    </div>
</div>
<script type="application/javascript">
    function openAddEpisodeModal(podcastTitle) {
        const modal = document.getElementById('addEpisodeModal');
        const newEpisodePodcastTitle = document.getElementById('episodePodcastTitle')
        newEpisodePodcastTitle.innerHTML = podcastTitle

        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.body.style.overflow = 'hidden';
    }
    function closeAddEpisodeModal() {
        const modal = document.getElementById('addEpisodeModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
        document.body.style.overflow = '';

        // Reset form
        const form = modal.querySelector('form');
        if (form) {
            form.reset();
        }
    }
    function handleAddEpisode(event) {
        event.preventDefault();
        // TODO: Implement actual API call to add episode
        console.log('Adding episode:', new FormData(event.target));
        alert('Episode will be added (API integration needed)');
        closeAddEpisodeModal();
    }
    // Close modal on Escape key
    document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
            closeAddEpisodeModal();
        }
    });
    // Close modal on background click
    document.getElementById('addEpisodeModal').addEventListener('click', function (event) {
        if (event.target === this) {
            closeAddEpisodeModal();
        }
    });
</script>
{% endmacro %}
