{% extends "sqladmin/base.html" %}
{% block body %}
<div class="d-flex align-items-center justify-content-center vh-100">
  <form class="col-lg-4 col-md-6 card card-md" action="{{ url_for('admin:login') }}" method="POST" autocomplete="off">
    <div class="card-body">
      <h2 class="card-title text-center mb-4">Login to {{ admin.title }}</h2>
      {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input name="email" type="email" class="form-control{% if error %} is-invalid{% endif %}" placeholder="admin@example.com" autocomplete="username">
      </div>
      <div class="mb-2">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control{% if error %} is-invalid{% endif %}" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
