services:
  web:
    container_name: podcast-app-web
    image: ${DOCKER_IMAGE:-podcast-app}
    ports:
      - 127.0.0.1:${APP_PORT}:${APP_PORT}
    env_file:
      - .env
    environment:
      APP_SERVICE: web
      APP_VERSION: ${DOCKER_IMAGE_TAG:-latest}
    networks:
      - storage
    healthcheck:
      test: ["CMD-SHELL", 'python -c "import os,socket; s=socket.socket(); s.connect((''127.0.0.1'', int(os.environ[''APP_PORT''])))"']
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 60s

  background:
    container_name: podcast-app-background
    image: ${DOCKER_IMAGE:-podcast-app}
    env_file:
      - .env
    environment:
      APP_SERVICE: background
      APP_VERSION: ${DOCKER_IMAGE_TAG:-latest}
    networks:
      - storage
    depends_on:
      web:
        condition: service_healthy

networks:
  storage:
    external: true
